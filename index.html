<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CAD Vault</title><style>body{margin:0;background:#0a0f1c;color:white;font-family:Segoe UI,sans-serif}nav{display:flex;justify-content:space-between;padding:20px 40px;background:#111827}button{cursor:pointer} .hero{text-align:center;padding:80px 20px}.hero h1{font-size:56px}.btn{padding:12px 20px;background:#2563eb;border:none;color:white;border-radius:8px}.section{padding:40px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}.card{background:#172033;padding:20px;border-radius:12px}.viewer{height:300px;background:#0f172a;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#60a5fa}.hidden{display:none}input{padding:10px;width:100%;max-width:400px}</style></head><body><nav><h2>CAD Vault</h2><div>Engineering Portfolio</div></nav><div class='hero'><h1>Explore CAD Models</h1><p>Browse, showcase, and organize engineering designs.</p><button class='btn' onclick='showSection("explore")'>Explore Models</button></div><div class='section'><div class='viewer' id='viewer'>3D Viewer Coming Soon</div></div><div class='section' id='explore'><h2>Model Library</h2><input id='search' placeholder='Search models...' onkeyup='searchModels()'><div class='cards' id='models'><div class='card model'>Gear Assembly</div><div class='card model'>LED Acrylic Display</div><div class='card model'>Drone Frame</div><div class='card model'>Engine Mount</div><div class='card model'>Phone Stand STL</div><div class='card model'>Robot Chassis</div></div></div><div class='section'><h2>Upload Design</h2><input type='file'><p>Upload STL, OBJ, or STEP files.</p></div><script>function showSection(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}function searchModels(){let q=document.getElementById('search').value.toLowerCase();document.querySelectorAll('.model').forEach(m=>{m.style.display=m.innerText.toLowerCase().includes(q)?'block':'none';});}</script></body></html>
